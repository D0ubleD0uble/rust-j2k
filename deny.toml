# cargo-deny policy. See https://embarkstudios.github.io/cargo-deny/.
# Run with `cargo deny check`.

[graph]
all-features = true

[advisories]
yanked = "deny"
ignore = []

[licenses]
# Permissive licenses accepted in dependencies. The crate itself ships no
# third-party codec, so this guards anything pulled in later.
unused-allowed-license = "allow"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
